version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: uni_market_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: student_marketplace
    volumes:
      - uni_market_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d student_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: uni_market_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - uni_market_minio_data:/data
    ports:
      - "127.0.0.1:9001:9001"

  minio-proxy:
    image: nginx:alpine
    container_name: uni_market_minio_proxy
    restart: unless-stopped
    depends_on:
      - minio
    ports:
      - "127.0.0.1:9002:80"
    volumes:
      - ./nginx/minio.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: uni_market_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-proxy:
        condition: service_started
    env_file:
      - ./backend/.env.production
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      sh -c "npx prisma migrate deploy && node dist/src/main.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: uni_market_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./frontend/.env.production
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  uni_market_postgres_data:
  uni_market_minio_data:
